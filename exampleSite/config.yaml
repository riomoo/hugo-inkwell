baseURL: "https://example.com/"
languageCode: "en-us"
title: "My Story"
theme: "hugo-inkwell"

# Inkwell Theme Configuration
params:
  # Story metadata
  storyTitle: "My Story"
  storyTagline: "A tale of wonder and shadow"
  author: "Your Name"
  authorBio: ""
  authorAvatar: ""   # path to image

  # UI Options
  showReadingProgress: true
  showWordCount: true
  showReadingTime: true
  showChapterNav: true       # prev/next chapter links at bottom
  showVolumeNav: true        # volume TOC in sidebar
  showTableOfContents: true  # in-chapter heading TOC
  tocDepth: 3

  # Cover image for homepage/social
  coverImage: ""

  # Footer
  footerText: ""

  # Features
  enableGlossary: true
  enableCharacters: true

  # Date format for chapters
  dateFormat: "January 2, 2006"

markup:
  goldmark:
    renderer:
      unsafe: true  # Allow raw HTML in markdown (needed for shortcodes)
  highlight:
    style: "dracula"
    lineNos: false

