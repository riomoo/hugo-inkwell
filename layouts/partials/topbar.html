<header class="inkwell-topbar">
  <button class="topbar-sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation" aria-controls="inkwell-sidebar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <a href="{{ "/" | relURL }}" class="topbar-logo">{{ .Site.Params.storyTitle | default .Site.Title }}</a>

  <nav class="topbar-nav" aria-label="Main navigation">
    {{ range .Site.Menus.main }}
    <a href="{{ .URL | relURL }}"{{ if eq $.RelPermalink .URL }} class="active"{{ end }}>{{ .Name }}</a>
    {{ end }}
    {{- if not .Site.Menus.main }}
    <a href="{{ "/volumes/" | relURL }}">Volumes</a>
    <a href="{{ "/characters/" | relURL }}">Characters</a>
    <a href="{{ "/glossary/" | relURL }}">Glossary</a>
    {{- end }}
  </nav>
</header>
