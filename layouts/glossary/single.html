{{ define "main" }}
<div class="chapter-breadcrumb" style="margin-bottom:1.5rem;">
  <a href="{{ "/glossary/" | relURL }}">Glossary</a>
  <span class="chapter-breadcrumb-sep">›</span>
  <span>{{ .Title }}</span>
</div>

{{- with .Params.volume }}
<div class="glossary-volume-header">
  <span class="glossary-volume-header-label">Volume</span>
  <span class="glossary-volume-header-name">{{ . }}</span>
</div>
{{- end }}

<div class="page-header">
  <h1>{{ .Title }}</h1>
  {{- with .Params.tags }}
  <div style="display:flex;gap:0.4rem;flex-wrap:wrap;margin-top:0.5rem;">
    {{- range . }}<span class="glossary-tag" style="font-size:0.8rem;">{{ . }}</span>{{- end }}
  </div>
  {{- end }}
</div>

<div class="chapter-body">
  {{ .Content }}
</div>

{{- /* Back link */ -}}
<div style="margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--ink-border-soft);">
  <a href="{{ "/glossary/" | relURL }}" class="btn btn-outline" style="font-size:0.82rem;">← Back to Glossary</a>
</div>
{{ end }}
